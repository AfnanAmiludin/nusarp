{% load compress %}
{% load static %}

<!DOCTYPE html>
<html lang="en" dir="ltr" data-nav-layout="vertical" class="light" data-header-styles="light" data-menu-styles="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> ERP NUSANTARA - {% block title %}{% endblock %}</title>
    <meta name="description" content="ERP NUSANTARA - {% block description %}{% endblock %}">
    <meta name="keywords" content="ERP NUSANTARA - {% block keywords %}{% endblock %}">

    <!-- Favicon -->
    <link rel="shortcut icon" href="{% static 'assets/img/brand-logos/favicon.ico' %}">

    <!-- Main JS -->
    <script src="{% static 'assets/js/main.js' %}"></script>

    <!-- Style Css -->
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/style.min.css' %}">

    <!-- Simplebar Css -->
    <link rel="stylesheet" href="{% static 'assets/libs/simplebar/simplebar.min.css' %}">

    <!-- Color Picker Css -->
    <link rel="stylesheet" href="{% static 'assets/libs/@simonwep/pickr/themes/nano.min.css' %}">

    <!-- Quil Css -->
    <link id="style" href="{% static 'assets/libs/quill/quill.snow.css' %}" rel="stylesheet">

    <!-- Choices Css -->
    <link rel="stylesheet" href="{% static 'assets/libs/choices.js/public/assets/styles/choices.min.css' %}">

    <!-- Filepond CSS -->
    <link rel="stylesheet" href="{% static 'assets/libs/filepond/filepond.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/libs/filepond-plugin-image-preview/filepond-plugin-image-preview.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/libs/filepond-plugin-image-edit/filepond-plugin-image-edit.min.css' %}">

    <!-- Flatpickr Css -->
    <link rel="stylesheet" href="{% static 'assets/libs/flatpickr/flatpickr.min.css' %}">

</head>

<body>

    <section class="flex flex-col md:flex-row h-screen items-center">
        <div class="bg-white w-full md:max-w-md lg:max-w-full md:mx-auto md:mx-0 md:w-1/2 xl:w-1/3 h-screen px-6 lg:px-16 xl:px-12 flex items-center justify-center">
          <div class="w-full h-100">
            <h1 class="text-xl md:text-2xl font-bold leading-tight mt-12">Log in to your account</h1>
  
            <!-- Pesan Error -->
            {% if messages %}
              <div id="messages" class="mt-4">
                {% for message in messages %}
                  <div class="p-4 mb-4 text-sm rounded-lg
                    {% if message.tags == 'error' %}bg-red-100 text-red-700
                    {% else %}bg-green-100 text-green-700
                    {% endif %}">
                    {{ message }}
                  </div>
                {% endfor %}
              </div>
            {% endif %}
  
            <!-- Form Login -->
            <form class="mt-6" method="POST" action="{% url 'login' %}">
              {% csrf_token %}
              <div>
                <label class="block text-gray-700">Username</label>
                <input type="text" name="user_name" placeholder="Enter Username" class="w-full px-4 py-3 rounded-lg bg-gray-200 mt-2 border focus:border-blue-500 focus:bg-white focus:outline-none" autofocus required>
              </div>
  
              <div class="mt-4">
                <label class="block text-gray-700">Password</label>
                <input type="password" name="password" placeholder="Enter Password" minlength="6" class="w-full px-4 py-3 rounded-lg bg-gray-200 mt-2 border focus:border-blue-500 focus:bg-white focus:outline-none" required>
              </div>
  
              <button type="submit" class="w-full block bg-indigo-500 hover:bg-indigo-400 focus:bg-indigo-400 text-white font-semibold rounded-lg px-4 py-3 mt-6">Log In</button>
            </form>
          </div>
        </div>
      </section>

  <!-- Custom JS -->
  {% block script %}{% endblock %}
  <!-- END Custom JS -->

</body>

</html>
